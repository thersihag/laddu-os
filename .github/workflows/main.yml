# Path: .github/workflows/main.yml
name: Build Laddu OS Launcher APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 1. Gradle wrapper ko execute karne ki permission dena zaroori hai
    - name: Grant Execute Permission to Gradle Wrapper
      run: chmod +x gradlew

    # 2. Global 'gradle' ki jagah './gradlew' use karo
    - name: Build Debug APK with Gradle Cloud
      run: ./gradlew assembleDebug

    - name: Upload Generated APK to Cloud Storage
      uses: actions/upload-artifact@v4
      with:
        name: Laddu-OS-Launcher-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
