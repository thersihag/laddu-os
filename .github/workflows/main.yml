# Path: .github/workflows/main.yml
name: Build Laddu OS Launcher APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Initialize Gradle Native Environment
      run: |
        gradle wrapper --gradle-version 8.2

    - name: Setup Gradle Cloud Engine
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APK with Local Wrapper
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Generated APK to Cloud Storage
      uses: actions/upload-artifact@v4
      with:
        name: Laddu-OS-Launcher-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
