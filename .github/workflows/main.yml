# Path: .github/workflows/main.yml
name: Build Laddu OS Launcher APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Yeh official pre-built Android complete virtual machine container hai
    container:
      image: mobiledevops/android-sdk-image:34.0.0

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Pre-configure Project Files
      run: |
        echo "sdk.dir=/opt/android-sdk-linux" > local.properties
        # Yahan cloud engine bina wrapper jhanjhat ke direct environment create karega

    - name: Compile and Force Build Debug APK
      run: |
        gradle assembleDebug --no-daemon --stacktrace

    - name: Upload Generated APK to Cloud Storage
      uses: actions/upload-artifact@v4
      with:
        name: Laddu-OS-Launcher-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
