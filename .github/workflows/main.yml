# Path: .github/workflows/main.yml
name: Build Laddu OS Launcher APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Validate Gradle Project Configuration
      run: |
        if [ ! -f "build.gradle.kts" ]; then
          echo "Error: Root build.gradle.kts not found!"
          exit 1
        fi

    - name: Build Debug APK via Android CLI
      run: |
        gradle assembleDebug --no-daemon --stacktrace

    - name: Upload Generated APK to Cloud Storage
      uses: actions/upload-artifact@v4
      with:
        name: Laddu-OS-Launcher-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
