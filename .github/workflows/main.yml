# Path: .github/workflows/main.yml
name: Build Laddu OS Launcher APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mobiledevops/android-sdk-image:34.0.0
      options: --user root

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Fix Directory Owner Permissions
      run: |
        git config --global --add safe.directory /__w/laddu-os/laddu-os
        chown -R root:root .

    - name: Pre-configure Project Files
      run: |
        echo "sdk.dir=/opt/android-sdk-linux" > local.properties

    # Is step mai hum build system ke andar hi gradle generator engine trigger karenge
    - name: Auto-Generate Local Gradle Executable
      run: |
        android update project -p . || true
        # Ubuntu compiler engine standard installation download script
        apt-get update && apt-get install -y gradle

    - name: Compile and Force Build Debug APK
      run: |
        gradle assembleDebug --no-daemon --stacktrace

    - name: Upload Generated APK to Cloud Storage
      uses: actions/upload-artifact@v4
      with:
        name: Laddu-OS-Launcher-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
