# Path: .github/workflows/main.yml
name: Build Laddu OS Launcher APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK with Full Error Tracking
      # 🔥 Added flags to force gradle to print the EXACT breaking line
      run: ./gradlew assembleDebug --stacktrace --info
      
    - name: Upload Generated APK to Cloud Storage
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Laddu-OS-Launcher-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
